
# ─────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Eventos Tech
# Desarrollado con asistencia de Claude (Anthropic)
#
# Triggers: push o PR a la rama main
# Jobs:
#   1. lint-and-test  → Lint TypeScript + test básico del backend
#   2. deploy-backend → Deploy a Render (API FastAPI)
#   3. deploy-frontend→ Deploy a Vercel (React + Vite)
# ─────────────────────────────────────────────────────────────────
name: CI/CD · Eventos Tech

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

# ─── JOB 1: Lint & Checks ─────────────────────────────────────────
jobs:
  lint-and-test:
    name: 🔍 Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar dependencias frontend
        run: pnpm install

      - name: Lint TypeScript / ESLint
        run: pnpm lint

      - name: Build frontend (verifica que compila)
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── Backend ───────────────────────────────────────────────
      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias backend
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verificar importaciones del backend
        run: |
          cd backend
          python -c "import main; print('✅ Backend importado correctamente')"

      - name: Test básico de endpoints (startup)
        run: |
          cd backend
          python -c "
          from main import app, init_db
          init_db()
          print('✅ DB inicializada correctamente')
          "

# ─── JOB 2: Deploy Backend (Render) ───────────────────────────────
  deploy-backend:
    name: 🚀 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
               -H "Accept: application/json" \
               --fail-with-body
          echo "✅ Deploy de backend disparado en Render"

# ─── JOB 3: Deploy Frontend (Vercel) ──────────────────────────────
  deploy-frontend:
    name: ⚡ Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy a Vercel (Producción)
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} \
                 --prod \
                 --yes \
                 -e VITE_API_URL=${{ secrets.VITE_API_URL }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🎉 Deploy completado
        run: echo "Frontend desplegado en Vercel exitosamente"
